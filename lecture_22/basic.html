<!DOCTYPE html>
<html lang="en">
<head>
    <title>jQuery All Examples</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .box {
            width: 200px;
            height: 100px;
            background: lightblue;
            margin-top: 20px;
            padding: 20px;
            position: relative;
        }

        .active {
            background: yellow;
            border: 2px solid red;
        }
    </style>
</head>
<body>

    <h1 id="heading">Welcome to jQuery</h1>
    <p class="para">Paragraph 1</p>
    <p class="para">Paragraph 2</p>

    <input type="text" id="inputBox" placeholder="Type here">
    <br><br>

    <button id="hideBtn">Hide</button>
    <button id="showBtn">Show</button>
    <button id="toggleBtn">Toggle</button>
    <button id="fadeBtn">Fade Toggle</button>
    <button id="slideBtn">Slide Toggle</button>
    <button id="animateBtn">Animate</button>
    <button id="changeText">Change Text</button>
    <button id="addClass">Toggle Class</button>
    <button id="appendBtn">Append</button>

    <div class="box" id="box">
        Hello Box
    </div>

    <script src="example.js"></script>
</body>
</html>
